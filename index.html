<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🔧 جعبه ابزار حرفه‌ای</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <!-- هدر -->
        <header class="header">
            <div class="header-content">
                <h1>🔧 جعبه ابزار</h1>
                <p class="subtitle">۲۰ ابزار کاربردی برای کنترل گوشی</p>
            </div>
            <div class="device-info">
                <span id="batteryStatus">🔋 --%</span>
                <span id="timeDisplay">🕐 --:--</span>
                <span id="networkStatus">📶 آنلاین</span>
            </div>
        </header>

        <!-- نوار جستجو -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 جستجوی ابزار...">
        </div>

        <!-- دسته‌بندی‌ها -->
        <div class="categories">
            <button class="cat-btn active" data-cat="all">همه</button>
            <button class="cat-btn" data-cat="system">سیستمی</button>
            <button class="cat-btn" data-cat="display">نمایش</button>
            <button class="cat-btn" data-cat="tools">ابزارها</button>
            <button class="cat-btn" data-cat="security">امنیتی</button>
        </div>

        <!-- شبکه ابزارها -->
        <main class="tools-grid" id="toolsGrid">
            <!-- ابزارها با JavaScript تولید می‌شوند -->
        </main>

        <!-- مودال جزئیات ابزار -->
        <div class="modal" id="toolModal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modalContent"></div>
            </div>
        </div>

        <!-- اعلان‌ها -->
        <div class="toast" id="toast"></div>

        <!-- منوی پایین -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="tools">
                <span>🧰</span>
                <span>ابزارها</span>
            </button>
            <button class="nav-btn" data-view="favorites">
                <span>⭐</span>
                <span>موردعلاقه‌ها</span>
            </button>
            <button class="nav-btn" data-view="settings">
                <span>⚙️</span>
                <span>تنظیمات</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
